version: '3.8'
networks:
  ansible.ai:
    name: ansible.ai

services:
  control:
    hostname: control
    container_name: control
    image: rheosai/ansible:ubuntu
    ports:
     - ${CONTROL_SSH_PORT}:22
    privileged: true
    volumes:
     - /sys/fs/cgroup:/sys/fs/cgroup:ro
    networks:
     - ansible.ai
